{% extends "base.html" %}
{% block title %}Esqueci a senha · IR Traders{% endblock %}
{% block auth_content %}
<div class="w-full max-w-md">
  <div class="text-center mb-6">
    <div class="inline-flex w-12 h-12 rounded-xl bg-brand/20 items-center justify-center text-brand font-bold text-lg mb-3">IR</div>
    <h1 class="text-2xl font-semibold">Redefinir senha</h1>
    <p class="text-slate-500 text-sm">Enviaremos um link de redefinição para o seu e-mail.</p>
  </div>
  <form method="post" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4">
    {{ form.csrf_token }}
    <div>
      <label class="block text-sm text-slate-400 mb-1">E-mail</label>
      <input name="email" type="email" required value="{{ form.email.data or '' }}"
             class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-brand">
    </div>
    <button class="w-full bg-brand hover:bg-brand-dark text-slate-950 font-semibold rounded-lg py-2.5 transition">Enviar link</button>
  </form>
  <p class="text-center text-sm text-slate-500 mt-4">
    Lembrou a senha? <a href="{{ url_for('auth.login') }}" class="text-brand hover:underline">Entrar</a>
  </p>
</div>
{% endblock %}
