<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline · IR Traders</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="min-h-screen bg-[#0b0f14] text-slate-200">
  <div class="mx-auto flex min-h-screen max-w-md flex-col items-center justify-center px-6 text-center">
    <span class="grid h-14 w-14 place-items-center rounded-xl bg-emerald-400 text-slate-950 text-lg font-black">IR</span>
    <h1 class="mt-5 text-xl font-semibold text-white">Você está offline</h1>
    <p class="mt-2 text-sm text-slate-400">
      Sem conexão no momento. Verifique a internet e tente de novo — seus dados estão salvos na sua conta.
    </p>
    <button onclick="location.reload()"
            class="mt-6 rounded-lg bg-emerald-400 px-4 py-2 text-sm font-semibold text-slate-950 hover:bg-emerald-300">
      Tentar novamente
    </button>
  </div>
</body>
</html>
