{% extends "base.html" %}
{% block title %}Nova senha · IR Traders{% endblock %}
{% block auth_content %}
<div class="w-full max-w-md">
  <div class="text-center mb-6">
    <div class="inline-flex w-12 h-12 rounded-xl bg-brand/20 items-center justify-center text-brand font-bold text-lg mb-3">IR</div>
    <h1 class="text-2xl font-semibold">Definir nova senha</h1>
    <p class="text-slate-500 text-sm">Escolha uma senha forte (mínimo de 8 caracteres).</p>
  </div>
  <form method="post" action="{{ url_for('auth.reset_password', token=token) }}"
        class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4">
    {{ form.csrf_token }}
    <div>
      <label class="block text-sm text-slate-400 mb-1">Nova senha</label>
      <input name="password" type="password" required minlength="8"
             class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-brand">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Confirmar nova senha</label>
      <input name="confirm" type="password" required minlength="8"
             class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:border-brand">
    </div>
    <button class="w-full bg-brand hover:bg-brand-dark text-slate-950 font-semibold rounded-lg py-2.5 transition">Salvar nova senha</button>
  </form>
</div>
{% endblock %}
