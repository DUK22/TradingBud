[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "instance", "preview", "__pycache__", "migrations"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, B: bugbear, UP: pyupgrade
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
    "E501",  # comprimento de linha (delegado ao formatter/line-length)
    "B008",  # chamadas em defaults de argumento (padrão Flask/SQLAlchemy)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # imports após sys.path.insert nos testes
